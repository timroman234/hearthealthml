# Grafana dashboard provisioning
# This file auto-loads dashboards from the dashboards folder

apiVersion: 1

providers:
  - name: "HeartHealthML"
    orgId: 1
    folder: ""
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
