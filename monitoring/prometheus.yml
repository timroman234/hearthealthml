# Prometheus configuration for HeartHealthML
# Scrapes metrics from the FastAPI application

global:
  scrape_interval: 15s
  evaluation_interval: 15s

  # Attach these labels to any time series or alerts when communicating with
  # external systems (federation, remote storage, Alertmanager)
  external_labels:
    monitor: "hearthealthml"

# Alertmanager configuration (optional)
alerting:
  alertmanagers:
    - static_configs:
        - targets: []
          # - alertmanager:9093

# Rule files (for recording and alerting rules)
rule_files:
  - "alerts/*.yml"

# Scrape configurations
scrape_configs:
  # HeartHealthML API metrics
  - job_name: "hearthealthml-api"
    static_configs:
      - targets: ["api:8000"]
    metrics_path: "/metrics"
    scrape_interval: 10s
    scrape_timeout: 5s

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Optional: Node exporter for system metrics
  # - job_name: "node"
  #   static_configs:
  #     - targets: ["node-exporter:9100"]
