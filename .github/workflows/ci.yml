# CI Pipeline - Runs on push/PR to main and develop branches
# Includes linting, testing, data validation, and Docker build

name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run Black
        run: uv run black --check src/ tests/ api/

      - name: Run Ruff
        run: uv run ruff check src/ tests/ api/

      - name: Run MyPy
        run: uv run mypy src/ --ignore-missing-imports

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests with coverage
        run: |
          uv run pytest tests/ \
            --cov=src \
            --cov-report=xml \
            --cov-report=html \
            --cov-fail-under=55 \
            -v

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  data-validation:
    name: Validate Data
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync

      - name: Validate data schema
        run: |
          uv run python -c "
          from pathlib import Path

          data_path = Path('data/raw/heart_disease_data.csv')
          if not data_path.exists():
              print('Data file not present (managed by DVC) - skipping validation')
          else:
              from src.data.loader import load_raw_data, validate_schema
              df = load_raw_data(data_path)
              expected_cols = ['age', 'sex', 'cp', 'trestbps', 'chol', 'fbs',
                              'restecg', 'thalach', 'exang', 'oldpeak', 'slope',
                              'ca', 'thal', 'target']
              assert validate_schema(df, expected_cols), 'Schema validation failed!'
              print('Data validation passed!')
          "

  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test, data-validation]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build training image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.train
          push: false
          tags: hearthealthml-train:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build serving image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.serve
          push: false
          tags: hearthealthml-serve:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
