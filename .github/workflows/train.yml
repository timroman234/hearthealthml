# Model Training Pipeline - Scheduled weekly or triggered manually
# Trains the model, evaluates metrics, and uploads artifacts

name: Model Training Pipeline

on:
  # Manual trigger with optional hyperparameter tuning
  workflow_dispatch:
    inputs:
      tune_hyperparameters:
        description: "Run hyperparameter tuning"
        required: false
        default: false
        type: boolean

  # Scheduled training (weekly on Sunday at midnight UTC)
  schedule:
    - cron: "0 0 * * 0"

env:
  PYTHON_VERSION: "3.11"
  MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}

jobs:
  train:
    name: Train Model
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync

      - name: Run training pipeline
        run: |
          if [ "${{ inputs.tune_hyperparameters }}" == "true" ]; then
            uv run python main.py --tune
          else
            uv run python main.py
          fi

      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts-${{ github.run_number }}
          path: |
            models/
            reports/
          retention-days: 30

      - name: Upload metrics
        uses: actions/upload-artifact@v4
        with:
          name: metrics-${{ github.run_number }}
          path: reports/metrics/
          retention-days: 90

  evaluate:
    name: Evaluate Model
    runs-on: ubuntu-latest
    needs: train
    steps:
      - uses: actions/checkout@v4

      - name: Download model artifacts
        uses: actions/download-artifact@v4
        with:
          name: model-artifacts-${{ github.run_number }}

      - name: Check model metrics
        run: |
          python -c "
          import json

          with open('reports/metrics/evaluation_metrics.json') as f:
              metrics = json.load(f)

          print('Model Metrics:')
          print(f'  Accuracy: {metrics[\"accuracy\"]:.4f}')
          print(f'  Precision: {metrics[\"precision\"]:.4f}')
          print(f'  Recall: {metrics[\"recall\"]:.4f}')
          print(f'  F1 Score: {metrics[\"f1\"]:.4f}')
          print(f'  ROC-AUC: {metrics[\"roc_auc\"]:.4f}')

          # Fail if metrics below threshold
          assert metrics['roc_auc'] >= 0.75, f'ROC-AUC {metrics[\"roc_auc\"]} below threshold 0.75'
          assert metrics['recall'] >= 0.70, f'Recall {metrics[\"recall\"]} below threshold 0.70'

          print('All metrics passed thresholds!')
          "

      - name: Create metrics summary
        run: |
          echo "## Model Training Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          python -c "
          import json
          with open('reports/metrics/evaluation_metrics.json') as f:
              m = json.load(f)
          print(f'| Metric | Value |')
          print(f'|--------|-------|')
          print(f'| Accuracy | {m[\"accuracy\"]:.4f} |')
          print(f'| Precision | {m[\"precision\"]:.4f} |')
          print(f'| Recall | {m[\"recall\"]:.4f} |')
          print(f'| F1 Score | {m[\"f1\"]:.4f} |')
          print(f'| ROC-AUC | {m[\"roc_auc\"]:.4f} |')
          " >> $GITHUB_STEP_SUMMARY
