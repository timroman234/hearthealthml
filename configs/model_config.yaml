# Model Hyperparameter Configurations

logistic_regression:
  default:
    C: 1.0
    penalty: l2
    solver: liblinear
    max_iter: 200
    class_weight: null
    random_state: 42

  tuning:
    param_grid:
      C: [0.001, 0.01, 0.1, 1, 10, 100]
      penalty: [l1, l2]
      solver: [liblinear]
      max_iter: [100, 200, 500]
      class_weight: [null, balanced]

    search_strategy: grid  # grid, random
    cv_folds: 5
    scoring: roc_auc

